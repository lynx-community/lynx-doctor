<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Lynx Doctor README banner</title>
  <desc id="desc">A light-mode banner showing the Lynx Doctor workflow: scan, explain, and launch an agent.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbfcf8"/>
      <stop offset="0.62" stop-color="#eef5ef"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="line" x1="130" y1="260" x2="1120" y2="164" gradientUnits="userSpaceOnUse">
      <stop stop-color="#169b6b"/>
      <stop offset="0.56" stop-color="#3387ff"/>
      <stop offset="1" stop-color="#24bd83"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#d7e6db" stroke-width="1" opacity="0.7"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="18" fill="url(#grid)"/>

  <circle cx="220" cy="90" r="118" fill="#24bd83" opacity="0.12" filter="url(#soft)"/>
  <circle cx="930" cy="256" r="156" fill="#3387ff" opacity="0.1" filter="url(#soft)"/>

  <path d="M80 250H286C334 250 344 204 392 204H492C540 204 550 158 598 158H800C850 158 858 206 908 206H1120" stroke="url(#line)" stroke-width="2.6" stroke-linecap="round" opacity="0.88"/>
  <path d="M80 250H286C334 250 344 204 392 204H492C540 204 550 158 598 158H800C850 158 858 206 908 206H1120" stroke="url(#line)" stroke-width="10" stroke-linecap="round" opacity="0.12"/>

  <g transform="translate(70 54)">
    <rect width="322" height="196" rx="12" fill="#ffffff" stroke="#c9ded0"/>
    <rect x="18" y="18" width="286" height="20" rx="10" fill="#eef5ef"/>
    <circle cx="34" cy="28" r="4" fill="#ff6b6b"/>
    <circle cx="50" cy="28" r="4" fill="#d99b1d"/>
    <circle cx="66" cy="28" r="4" fill="#24bd83"/>
    <text x="22" y="72" fill="#3b5448" font-family="SFMono-Regular, Consolas, monospace" font-size="18">$ npx lynx-doctor --diff</text>
    <text x="22" y="106" fill="#169b6b" font-family="SFMono-Regular, Consolas, monospace" font-size="17">scan: 38 files</text>
    <text x="22" y="136" fill="#946200" font-family="SFMono-Regular, Consolas, monospace" font-size="17">2 errors / 3 warnings</text>
    <text x="22" y="166" fill="#3387ff" font-family="SFMono-Regular, Consolas, monospace" font-size="17">agent prompt ready</text>
  </g>

  <g transform="translate(430 78)">
    <text x="0" y="32" fill="#13201a" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="760">Scan, explain, then hand off to agents.</text>
    <text x="2" y="68" fill="#3b5448" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">Lynx project diagnostics, ready for focused fixes.</text>

    <g transform="translate(0 112)">
      <rect width="182" height="70" rx="12" fill="#ffffff" stroke="#c9ded0"/>
      <text x="20" y="29" fill="#169b6b" font-family="SFMono-Regular, Consolas, monospace" font-size="15">01 / scan</text>
      <text x="20" y="52" fill="#13201a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Project signals</text>
    </g>

    <g transform="translate(210 112)">
      <rect width="182" height="70" rx="12" fill="#ffffff" stroke="#c9ded0"/>
      <text x="20" y="29" fill="#3387ff" font-family="SFMono-Regular, Consolas, monospace" font-size="15">02 / explain</text>
      <text x="20" y="52" fill="#13201a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Lynx risks</text>
    </g>

    <g transform="translate(420 112)">
      <rect width="182" height="70" rx="12" fill="#ffffff" stroke="#c9ded0"/>
      <text x="20" y="29" fill="#24bd83" font-family="SFMono-Regular, Consolas, monospace" font-size="15">03 / repair</text>
      <text x="20" y="52" fill="#13201a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Agent handoff</text>
    </g>
  </g>
</svg>
