name: "Bug Report"
description: Report a bug to Lynx Doctor
title: "[Bug]: "
type: Bug
labels: ["pending triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report this issue! Before submitting, please note:

         - Confirm that your problem cannot be solved by official documentation.
         - Make sure you have searched in the [Issues](https://github.com/lynx-community/lynx-doctor/issues) and have not found the same issue.
         - If it is not a bug report, please post on the [Discussions](https://github.com/lynx-community/lynx-doctor/discussions).

  - type: textarea
    id: system-info
    attributes:
      label: System Info
      description: Output of `npx envinfo --system --binaries --npmPackages 'lynx-doctor,@lynx-js/*'`
      placeholder: |
        System:
        Binaries:
        npmPackages:
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Please describe the bug. Screenshots, terminal output, and the generated report are helpful.
    validations:
      required: true

  - type: input
    id: reproduce
    attributes:
      label: Reproduce link
      description: "Please provide a repository that reproduces the problem. We recommend the Lynx repro template for creating a minimal reproducible example."
      placeholder: paste link here

  - type: textarea
    id: reproduce-steps
    attributes:
      label: Reproduce Steps
      description: Please provide the simplest steps so that we can quickly reproduce the problem.
      placeholder: |
        For example:
        1. Run `npx lynx-doctor`
        2. Find the unexpected diagnostic
    validations:
      required: true
