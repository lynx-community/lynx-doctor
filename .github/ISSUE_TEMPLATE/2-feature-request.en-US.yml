name: "Feature Request"
description: Submit a new feature request to Lynx Doctor
title: "[Feature]: "
type: Feature
labels: ["pending triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for submitting a new feature request! Before submitting, please note:

         - Confirm that this is a common feature and cannot be implemented using existing configuration.
         - Make sure you have searched in the [Issues](https://github.com/lynx-community/lynx-doctor/issues) and have not found the same request.
         - You can discuss the feature in the [Discussions](https://github.com/lynx-community/lynx-doctor/discussions) first.

  - type: textarea
    id: description
    attributes:
      label: What problem does this feature solve?
      description: Please describe the use case for this feature.
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: What should the proposed CLI, rule, or configuration look like?
      description: Describe the new behavior and give examples when possible.
    validations:
      required: true
